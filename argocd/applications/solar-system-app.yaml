apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solar-system
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:andreelidio/k8s-lab.git
    targetRevision: main
    # Usar Helm chart em vez de manifests puros
    path: helm-charts/solar-system
    helm:
      valueFiles:
        - values.yaml
    
  destination:
    server: https://kubernetes.default.svc
    namespace: solar-system
  
  syncPolicy:
    automated:
      prune: true      # Remove recursos que não estão mais no Git
      selfHeal: true   # Corrige alterações manuais no cluster
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m